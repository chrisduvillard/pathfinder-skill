name: manifests

# Guards the machine-read and cross-file surfaces in this markdown-only skill:
# (1) the four plugin/marketplace manifests must be valid JSON, the version
# declared in VERSION.md must match both plugin manifests, and neither
# marketplace.json may declare a version (plugin.json is the single source);
# (2) VERSION.md release hygiene: exactly one 'Version:' line and a
# 'Changes in v<version>:' changelog entry for it; (3) SKILL.md and its reference
# templates must not drift on shared invariants, every reference path SKILL.md
# cites must exist, the artifact-file contract must match across SKILL.md and
# artifact-structure.md, and every skill markdown file must close every code fence
# it opens. Drift or a JSON typo otherwise ships silently and only breaks at
# marketplace install time or in the agent's behavior.

on:
  push:
    branches: [main]
  pull_request:

# (DX-3) Scope push to main and de-duplicate runs: a feature-branch push with an open
# PR otherwise triggers both a push and a pull_request run, and rapid pushes stack
# instead of superseding. Cancel in-progress runs for the same ref.
concurrency:
  group: manifests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  check:
    name: version + JSON consistency
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      # (DX-2) All four manifests + VERSION.md hygiene + version parity + marketplace
      # version-absence are checked by one script that CONTRIBUTING runs too, so a
      # contributor reproduces every failure locally before pushing (these checks used
      # to live only inline here).
      - name: Manifest + version consistency
        run: bash scripts/check-manifests.sh

      - name: Check SKILL.md <-> reference-template consistency
        run: bash scripts/check-skill-consistency.sh
